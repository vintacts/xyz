            // ============================================
            // STATE & UTILITY FUNCTIONS
            // ============================================
            let activeCategory = "Semua";
            let currentView = "home";
            let selectedProduct = null;

            const formatIDR = (val) => {
                return new Intl.NumberFormat('id-ID', { 
                    style: 'currency', 
                    currency: 'IDR', 
                    minimumFractionDigits: 0 
                }).format(val);
            };

            const escapeHtml = (str) => {
                if (!str) return '';
                return str.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            };

            const getQRISHTML = () => {
                if (QRIS_IMAGE_URL && QRIS_IMAGE_URL.trim() !== "") {
                    return `<img class="qris-image" src="${QRIS_IMAGE_URL}" alt="QRIS Payment">`;
                }
                return `
                    <div class="qris-placeholder">
                        <i class="fas fa-qrcode"></i>
                        <p>Scan QRIS untuk pembayaran</p>
                        <p style="font-size:0.7rem;">DANA / OVO / GoPay</p>
                        <p style="font-size:0.6rem; margin-top:8px;">(Ganti QRIS_IMAGE_URL dengan foto QRIS asli Anda)</p>
                    </div>
                `;
            };

            // ============================================
            // RENDER FUNCTIONS
            // ============================================
            
            // Render Home Page (Product Grid)
            function renderHomePage() {
                currentView = "home";
                selectedProduct = null;
                
                const filtered = activeCategory === "Semua" 
                    ? products 
                    : products.filter(p => p.category === activeCategory);
                
                const mainContent = document.getElementById("mainContent");
                if (!mainContent) return;
                
                mainContent.innerHTML = `
                    <div class="top-bar"></div>
                    <div class="welcome-section">
                        <div class="welcome-text">
                            <h1>Temukan Template Terbaik</h1>
                            <p>Koleksi template website premium siap pakai untuk kebutuhan bisnis Anda</p>
                        </div>
                        <div class="welcome-stats">
                            <div class="stat-item">
                                <div class="stat-number">16+</div>
                                <div class="stat-label">Template</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-number">4</div>
                                <div class="stat-label">Kategori</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-number">24/7</div>
                                <div class="stat-label">Support</div>
                            </div>
                        </div>
                    </div>
                    <div class="products-grid" id="productsGrid">
                        ${filtered.map(p => `
                            <div class="product-card" data-id="${p.id}">
                                <div class="card-img" style="background-image:url('${p.img}');">
                                    <span class="card-cat">${escapeHtml(p.category)}</span>
                                </div>
                                <div class="card-info">
                                    <div class="card-title">
                                        <span>${escapeHtml(p.name)}</span>
                                        <span class="card-price">${formatIDR(p.price)}</span>
                                    </div>
                                    <div class="card-desc">${escapeHtml(p.desc)}</div>
                                    <div class="card-buttons">
                                        <button class="btn-detail" data-id="${p.id}">
                                            <i class="fas fa-info-circle"></i> Detail
                                        </button>
                                        <button class="btn-buy" data-id="${p.id}">
                                            <i class="fas fa-bolt"></i> Beli
                                        </button>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                
                // Attach event listeners
                document.querySelectorAll('.btn-detail').forEach(btn => {
                    btn.addEventListener("click", (e) => {
                        e.stopPropagation();
                        const product = products.find(p => p.id == btn.dataset.id);
                        if (product) renderDetailPage(product);
                    });
                });
                
                document.querySelectorAll('.btn-buy').forEach(btn => {
                    btn.addEventListener("click", (e) => {
                        e.stopPropagation();
                        const product = products.find(p => p.id == btn.dataset.id);
                        if (product) renderCheckoutPage(product);
                    });
                });
            }
            
            // Render Detail Page (with View Button on Image)
            function renderDetailPage(product) {
                if (!product) return;
                
                currentView = "detail";
                selectedProduct = product;
                
                const images = product.images || [product.img, product.img, product.img];
                const stars = "★★★★★";
                const t = product.testimonial;
                const demoUrl = product.demoLink || "#";
                
                const mainContent = document.getElementById("mainContent");
                if (!mainContent) return;
                
                mainContent.innerHTML = `
                    <div class="detail-page">
                        <button class="back-btn" id="backToHomeBtn">
                            <i class="fas fa-arrow-left"></i> Kembali ke Beranda
                        </button>
                        <div class="detail-layout">

                                </div>

                                    `).join('')}

                                            <div>
                                                <div class="author-name">${escapeHtml(t.name)}</div>
                                                <div class="author-role">${escapeHtml(t.role)}</div>
                                                <div style="color:#fbbf24; font-size:0.7rem;">${stars}</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="detail-info">
                                <span class="detail-category">${escapeHtml(product.category)}</span>
                                <h1>${escapeHtml(product.name)}</h1>
                                <div class="detail-price">${formatIDR(product.price)}</div>
                                <p class="detail-desc">${escapeHtml(product.longDesc)}</p>
                                <h4><i class="fas fa-cubes"></i> Teknologi</h4>
                                <div class="detail-tech">
                                    ${product.tech.map(tag => `<span class="tech-tag">${escapeHtml(tag)}</span>`).join('')}
                                </div>
                                <h4><i class="fas fa-star"></i> Fitur Unggulan</h4>
                                <ul class="detail-features">
                                    ${product.features.map(f => `<li><i class="fas fa-check-circle"></i> ${escapeHtml(f)}</li>`).join('')}
                                </ul>
                                <button class="btn-buy-large" id="buyNowBtn">
                                    <i class="fas fa-bolt"></i> Beli Template Sekarang - ${formatIDR(product.price)}
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                
                // Event Listeners
                const backBtn = document.getElementById("backToHomeBtn");
                if (backBtn) backBtn.addEventListener("click", () => renderHomePage());
                
                const buyBtn = document.getElementById("buyNowBtn");
                if (buyBtn) buyBtn.addEventListener("click", () => renderCheckoutPage(product));
                
                // Thumbnail click handler
                const thumbs = document.querySelectorAll(".thumb");
                const mainImg = document.getElementById("mainImg");
                thumbs.forEach(thumb => {
                    thumb.addEventListener("click", () => {
                        if (mainImg) mainImg.src = thumb.dataset.img;
                        thumbs.forEach(t => t.classList.remove("active"));
                        thumb.classList.add("active");
                    });
                });
            }

                const mainContent = document.getElementById("mainContent");

                            </div>
                            <div class="checkout-right">
                                <div class="qris-box">${getQRISHTML()}</div>
                                <div class="qris-note">Scan QRIS di atas dengan Apk pembayaran anda</div>
                                <button class="btn-send-proof" id="sendProofBtn">
                                    <i class="fas fa-paper-plane"></i> Kirim Bukti
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                
                // Event Listeners
                const backBtn = document.getElementById("backToPrev");
                if (backBtn) {
                    backBtn.addEventListener("click", () => {
                        if (selectedProduct) renderDetailPage(selectedProduct);
                        else renderHomePage();
                    });
                }
                
                const buyerNameInput = document.getElementById("buyerName");
                const buyerEmailInput = document.getElementById("buyerEmail");
                const sendProofBtn = document.getElementById("sendProofBtn");
                
                const checkFormAndEnableButton = () => {
                    const name = buyerNameInput ? buyerNameInput.value.trim() : "";
                    const email = buyerEmailInput ? buyerEmailInput.value.trim() : "";
                    if (sendProofBtn) {
                        if (name && email) {
                            sendProofBtn.classList.add("active");
                            sendProofBtn.disabled = false;
                        } else {
                            sendProofBtn.classList.remove("active");
                            sendProofBtn.disabled = true;
                        }
                    }
                };
                
                if (buyerNameInput) buyerNameInput.addEventListener("input", checkFormAndEnableButton);
                if (buyerEmailInput) buyerEmailInput.addEventListener("input", checkFormAndEnableButton);
                
                if (sendProofBtn) {
                    sendProofBtn.disabled = true;
                    sendProofBtn.addEventListener("click", () => {
                        if (sendProofBtn.disabled) return;
                        const name = buyerNameInput ? buyerNameInput.value.trim() : "";
                        const email = buyerEmailInput ? buyerEmailInput.value.trim() : "";
                        const productName = product.name;
                        const message = `Halo Vintacts, saya ${name} (${email}) ingin mengirim bukti pembayaran untuk template "${productName}". Berikut buktinya:`;
                        window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`, "_blank");
                    });
                }
            }
            
            // ============================================
            // EVENT LISTENERS & INITIALIZATION
            // ============================================
            
            // Category filter
            document.querySelectorAll('.nav-category').forEach(cat => {
                cat.addEventListener('click', () => {
                    document.querySelectorAll('.nav-category').forEach(c => c.classList.remove('active'));
                    cat.classList.add('active');
                    activeCategory = cat.getAttribute('data-category');
                    renderHomePage();
                });
            });
            
            // Home link (logo)
            const homeLink = document.getElementById("homeLink");
            if (homeLink) homeLink.addEventListener("click", () => renderHomePage());
            
            // ============================================
            // SECURITY FEATURES
            // ============================================
            document.addEventListener('contextmenu', (e) => e.preventDefault());
            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey && (e.key === 'u' || e.key === 'U' || e.key === 's' || e.key === 'S')) || 
                    (e.ctrlKey && e.shiftKey && e.key === 'I')) {
                    e.preventDefault();
                }
            });
            
            // ============================================
            // START APPLICATION
            // ============================================
            renderHomePage();
        })();
    </script>
</body>
</html>
